<!DOCTYPE html>
<html>
<head>
    <title>AI Hearing Assist System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">

        <h2 class="text-center text-primary">AI Hearing Assist System</h2>

        <!-- AUDIO UPLOAD -->
        <form method="POST" enctype="multipart/form-data" class="mt-4">

            <div class="mb-3">
                <label class="form-label">Upload Audio File</label>
                <input type="file" class="form-control" name="audio">
            </div>

            <button type="submit" class="btn btn-success w-100">
                Process Audio
            </button>

        </form>

        <!-- TRANSCRIPT -->
        {% if transcript %}
        <hr>
        <h5>Transcript</h5>
        <div class="alert alert-secondary">
            {{ transcript }}
        </div>
        {% endif %}

        <!-- SUMMARY -->
        {% if summary %}
        <h5>Summary</h5>
        <div class="alert alert-info">
            {{ summary }}
        </div>
        {% endif %}

        <hr>

        <!-- TEXT TO SPEECH -->
        <h5>Write Your Reply</h5>

        <form method="POST">

            <textarea name="user_text"
                      class="form-control"
                      rows="4"
                      placeholder="Write your reply here..."></textarea>

            <br>

            <button type="submit" class="btn btn-primary w-100">
                Convert to Speech
            </button>

        </form>

        <!-- AUDIO OUTPUT -->
        {% if reply_audio %}
        <hr>
        <h5>Audio Reply</h5>

        <audio controls class="w-100">
            <source src="{{ reply_audio }}" type="audio/mp3">
        </audio>

        {% endif %}

    </div>
</div>

</body>
</html>
